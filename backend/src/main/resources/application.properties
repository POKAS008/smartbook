# ?? Database (your Docker container) ??
spring.datasource.url=jdbc:postgresql://localhost:5433/smartbook
spring.datasource.username=postgres
spring.datasource.password=smartbook123
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA / Hibernate ??
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ?? Server ??
server.port=8081

# ?? JWT ??
app.jwt.secret=SmartBookSecretKey2026!
app.jwt.expiration=86400000

# ?? CORS (allows React to call the API) ??
app.cors.allowed-origins=http://localhost:5173

# Disable security temporarily for testing
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always