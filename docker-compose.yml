version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: smartbook-db
    restart: always
    environment:
      POSTGRES_DB: smartbook
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: smartbook123
    ports:
      - "5433:5432"
    volumes:
      - smartbook_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: smartbook-redis
    ports:
      - "6380:6379"

volumes:
  smartbook_pgdata: